<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentication - Cloud Task Manager</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-container { max-width: 400px; margin: 100px auto; }
    .toggle-link { text-align: center; margin-top: 15px; cursor: pointer; color: var(--primary); font-size: 14px; }
  </style>
</head>
<body>
  <div class="container auth-container">
    <h2 id="authTitle">🔐 Account Login</h2>
    
    <form id="authForm">
      <div class="form-group" id="usernameGroup" style="display: none;">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Choose a username">
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <button type="submit" id="authBtn">Login</button>
      <div id="toggleAuth" class="toggle-link">Don't have an account? Register here</div>
    </form>
  </div>

  <script>
    let isLoginMode = true;
    const authForm = document.getElementById('authForm');
    const usernameGroup = document.getElementById('usernameGroup');
    const authTitle = document.getElementById('authTitle');
    const authBtn = document.getElementById('authBtn');
    const toggleAuth = document.getElementById('toggleAuth');

    // Switch between Login and Registration visual modes
    toggleAuth.addEventListener('click', () => {
      isLoginMode = !isLoginMode;
      if (isLoginMode) {
        authTitle.innerText = "🔐 Account Login";
        authBtn.innerText = "Login";
        usernameGroup.style.display = "none";
        document.getElementById('username').required = false;
        toggleAuth.innerText = "Don't have an account? Register here";
      } else {
        authTitle.innerText = "📝 Create Account";
        authBtn.innerText = "Register";
        usernameGroup.style.display = "block";
        document.getElementById('username').required = true;
        toggleAuth.innerText = "Already have an account? Login here";
      }
    });

    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const username = document.getElementById('username').value;

      const endpoint = isLoginMode ? '/auth/login' : '/auth/register';
      
      const payload = isLoginMode 
        ? { username: username || email, password } 
        : { username, email, password };

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || data.message || "Authentication failed");

        if (isLoginMode) {
          localStorage.setItem('token', data.token);
          alert("Login successful!");
          window.location.href = '/'
        } else {
          alert("Registration successful! Switching to login...");
          toggleAuth.click();
        }
      } catch (err) {
        alert(err.message);
      }
    });
  </script>
</body>
</html>
